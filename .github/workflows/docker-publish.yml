name: Build & publish multi-arch Docker image

# Triggered manually (workflow_dispatch) or automatically on semver release
# tags (e.g. v1.2.3).  Push-to-main does NOT trigger a build automatically.
#
# The image is pushed to the GitHub Container Registry as:
#   ghcr.io/mdmoore25404/mediareviewer:<semver>  (e.g. 1.2.3)
#   ghcr.io/mdmoore25404/mediareviewer:latest     (on every successful push)

on:
  workflow_dispatch:   # manual trigger from the GitHub Actions UI
  push:
    tags:
      - "v*.*.*"       # semver release tags only (e.g. v1.2.3)

permissions:
  contents: read
  packages: write  # needed to push to ghcr.io

jobs:
  build-and-push:
    name: Build multi-arch image
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── QEMU — enables cross-compilation of arm64 on the amd64 runner ───
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Buildx — multi-platform build driver ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login ─────────────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata (tags + labels) ──────────────────────────────────────────
      # Produces tags like:
      #   v1.2.3 tag         → ghcr.io/.../mediareviewer:1.2.3, :1.2, :latest
      #   workflow_dispatch  → ghcr.io/.../mediareviewer:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mdmoore25404/mediareviewer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/mdmoore25404/mediareviewer
            org.opencontainers.image.description=Media Reviewer — lightweight mobile-first image/video review tool

      # ── Build and push ─────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored inside GitHub Actions cache — speeds up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
