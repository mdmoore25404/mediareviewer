title: Media Reviewer
description: >-
  A lightweight, mobile-first web application for reviewing and sorting large
  sets of images and videos — no database required.
baseurl: "/mediareviewer"
url: "https://mdmoore25404.github.io"

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-relative-links

# Source configuration
source: .
include:
  - api/
  - architecture.md
  - lint-notes.md

# Mermaid diagram rendering via CDN script injection
# (Mermaid code fences are rendered client-side by the theme layout)
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation order hint (used by some themes)
nav_order:
  - index
  - api/reference
  - architecture
  - lint-notes
