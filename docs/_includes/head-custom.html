<!-- Mermaid diagram rendering
     Kramdown renders ```mermaid fences as <pre><code class="language-mermaid">.
     This script replaces those elements with <div class="mermaid"> before
     calling mermaid.run() so diagrams are rendered client-side.
     ES module scripts are deferred by default, so the DOM is fully parsed
     before this executes. -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });
  document.querySelectorAll('pre > code.language-mermaid').forEach(el => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.closest('pre').replaceWith(div);
  });
  mermaid.run();
</script>
